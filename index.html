<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КИНОСФЕРА — Премиум Бронирование</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <header class="cinema-top-bar">
        <div class="top-bar-left">
            <div class="city-selector-container" id="city-dropdown-wrapper">
                <button class="city-selector-btn" id="active-city-btn"><span id="current-city-name">Москва</span> ▼</button>
                <div class="city-dropdown-menu">
                    <div class="city-option">Москва</div>
                    <div class="city-option">Санкт-Петербург</div>
                </div>
            </div>
        </div>
        <div class="logo">КИНО<span>СФЕРА</span></div>
    </header>

    <main class="main-layout">
        <section class="catalog-section">
            <h2 class="section-title">Сегодня в КИНО</h2>
            <div id="movies-grid" class="movies-responsive-grid">
                <div class="movie-premium-card" data-movie="bogatiry">
                    <div class="poster-wrapper"><img src="bogatyry.jpg" alt="Фильм"></div>
                    <div class="movie-info"><h3>Три богатыря</h3></div>
                </div>
                <div class="movie-premium-card" data-movie="karamazovy">
                    <div class="poster-wrapper"><img src="brothers-karamazovy.jpg" alt="Фильм"></div>
                    <div class="movie-info"><h3>Братья Карамазовы</h3></div>
                </div>
            </div>
        </section>

        <section id="booking-workspace" class="booking-workspace hidden">
            <h2 id="current-movie-title" class="section-title">Выбор сеанса</h2>
            <div id="session-selector" class="session-selector">
                <p id="movie-details" class="movie-details"></p>
                <div id="session-time-slots" class="session-time-slots"></div>
            </div>

            <div id="seats-and-bar-area" class="hidden">
                <h3 class="block-subtitle">Выберите места:</h3>
                <div class="interactive-hall-viewport">
                    <div id="dynamic-hall-grid" class="dynamic-hall-grid"></div>
                </div>
                <div class="bar-container">
                    <h3>Кинобар</h3>
                    <label><input type="checkbox" class="bar-item" data-price="350"> Попкорн — 350 ₽</label>
                </div>
                <div class="checkout-sticky-panel">
                    <p>ИТОГО: <span id="display-total-sum">0</span> ₽</p>
                    <button id="final-checkout-btn">Оформить заказ</button>
                </div>
            </div>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
