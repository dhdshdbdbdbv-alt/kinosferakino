
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaVerse — Бронирование билетов онлайн</title>
    <style>
        :root {
            --primary: #e50914;
            --primary-hover: #b80710;
            --bg: #141414;
            --card-bg: #1f1f1f;
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --available: #4caf50;
            --selected: #ffcc00;
            --occupied: #333333;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: rgba(20, 20, 20, 0.95);
            border-bottom: 1px solid #252525;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            position: relative;
            padding-left: 15px;
        }

        h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            background-color: var(--primary);
            border-radius: 2px;
        }

        /* Кинокаталог */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: var(--transition);
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .movie-poster {
            width: 100%;
            height: 360px;
            background: linear-gradient(45deg, #2c3e50, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .movie-poster-fallback {
            font-size: 4rem;
            opacity: 0.3;
        }

        .movie-rating {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.8);
            color: var(--selected);
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 204, 0, 0.4);
        }

        .movie-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .movie-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            text-align: center;
            margin-top: auto;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* Секция бронирования */
        .booking-section {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            margin-bottom: 50px;
            border: 1px solid #252525;
            display: none;
        }

        .booking-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
        }

        @media (max-width: 992px) {
            .booking-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Сеансы */
        .sessions-container {
            margin-bottom: 30px;
        }

        .session-time-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .session-chip {
            background-color: #252525;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .session-chip:hover {
            border-color: var(--primary);
        }

        .session-chip.active {
            background-color: var(--primary);
            color: white;
        }

        /* Схема зала */
        .hall-container {
            margin: 40px 0;
            overflow-x: auto;
            padding: 20px 0;
        }

        .screen {
            width: 80%;
            height: 8px;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0));
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin: 0 auto 40px auto;
            border-radius: 50%;
            text-align: center;
            position: relative;
        }

        .screen-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .seating-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(35px, 1fr));
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .seat {
            aspect-ratio: 1;
            background-color: var(--available);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: rgba(0,0,0,0.6);
            user-select: none;
        }

        .seat.occupied {
            background-color: var(--occupied);
            color: transparent;
            cursor: not-allowed;
        }

        .seat.selected {
            background-color: var(--selected);
            color: #000;
            transform: scale(1.1);
        }

        /* Легенда */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        /* Кинобар */
        .bar-section {
            margin-top: 40px;
        }

        .bar-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .bar-item {
            background-color: #252525;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .bar-item-info h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .bar-item-info p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .bar-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .counter-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .counter-btn:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        .counter-value {
            font-size: 1.1rem;
            font-weight: bold;
            width: 25px;
            text-align: center;
        }

        /* Панель корзины */
        .cart-sidebar {
            background-color: #252525;
            border-radius: var(--border-radius);
            padding: 25px;
            height: fit-content;
            border: 1px solid #333;
            position: sticky;
            top: 100px;
        }

        .cart-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .cart-item span:last-child {
            color: var(--text);
            font-weight: 600;
        }

        .total-price {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--selected);
        }

        /* Форма заказа */
        .checkout-form {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg);
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Модальное окно (Чек) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ticket-modal {
            background-color: white;
            color: #000;
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .ticket-header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .ticket-logo {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .ticket-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 1rem;
        }

        .ticket-row {
            display: flex;
            justify-content: space-between;
        }

        .ticket-row .label {
            color: #666;
        }

        .ticket-row .val {
            font-weight: 600;
        }

        .ticket-footer {
            margin-top: 25px;
            border-top: 2px dashed #ccc;
            padding-top: 15px;
            text-align: center;
        }

        .barcode {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #000 2px, transparent 2px, #000 4px, transparent 4px, #000 8px, transparent 8px, #000 12px, transparent 12px);
            background-size: 20px 100%;
            margin: 15px 0 5px 0;
        }

        /* Медиа-запросы для экстра-мобильности */
        @media (max-width: 576px) {
            body {
                padding-bottom: 40px;
            }
            main {
                margin: 15px auto;
            }
            .booking-section {
                padding: 15px;
            }
            .seating-grid {
                grid-template-columns: repeat(10, minmax(24px, 1fr));
                gap: 6px;
            }
            .seat {
                font-size: 0.65rem;
                border-radius: 4px;
            }
            .bar-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .bar-controls {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">CinemaVerse</div>
        </div>
    </header>

    <main>
        <section>
            <h2>Сейчас в кино</h2>
            <div class="movie-grid" id="movie-grid"></div>
        </section>

        <section class="booking-section" id="booking-section">
            <h2 id="booking-headline">Выбор мест и услуг</h2>
            
            <div class="booking-layout">
                <div class="booking-left">
                    <div class="sessions-container">
                        <h3>Выберите время сеанса:</h3>
                        <div class="session-time-grid" id="session-grid"></div>
                    </div>

                    <div id="hall-wrapper" style="display:none;">
                        <h3>Выберите места на схеме:</h3>
                        <div class="hall-container">
                            <div class="screen">
                                <div class="screen-text">Экран</div>
                            </div>
                            <div class="seating-grid" id="seating-grid"></div>
                        </div>
                        <div class="legend">
                            <div class="legend-item"><div class="legend-box" style="background-color: var(--available);"></div>Свободно</div>
                            <div class="legend-item"><div class="legend-box" style="background-color: var(--selected);"></div>Выбрано</div>
                            <div class="legend-item"><div class="legend-box" style="background-color: var(--occupied);"></div>Занято</div>
                        </div>
                    </div>

                    <div class="bar-section" id="bar-section" style="display:none;">
                        <h3>Кинобар & Закуски</h3>
                        <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;">Добавьте комбо или любимые снеки к сеансу:</p>
                        <div class="bar-grid" id="bar-grid"></div>
                    </div>
                </div>

                <div class="booking-right" id="cart-wrapper" style="display:none;">
                    <div class="cart-sidebar">
                        <div class="cart-title">Ваш заказ</div>
                        <div id="cart-details"></div>
                        <div class="total-price">
                            <span>Итого:</span>
                            <span id="total-cost">0 ₽</span>
                        </div>

                        <form class="checkout-form" id="checkout-form" onsubmit="handleCheckout(event)">
                            <div class="form-group">
                                <input type="text" id="user-name" placeholder="Ваше имя" required>
                            </div>
                            <div class="form-group">
                                <input type="email" id="user-email" placeholder="E-mail для билета" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" id="user-phone" placeholder="+7 (999) 000-00-00" required>
                            </div>
                            <button type="submit" class="btn">Подтвердить заказ</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="ticket-modal" onclick="event.stopPropagation()">
            <div class="ticket-header">
                <div class="ticket-logo">CinemaVerse</div>
                <div style="font-size: 0.8rem; color: #666; margin-top: 5px;">Электронный чек бронирования</div>
            </div>
            <div class="ticket-body" id="ticket-receipt-body"></div>
            <div class="ticket-footer">
                <p style="font-weight: bold; font-size: 0.9rem;">Предъявите код на входе в зал</p>
                <div class="barcode"></div>
                <p style="font-size: 0.75rem; color:#888; margin-top:5px;" id="ticket-id"></p>
                <button class="btn" style="margin-top:20px; background-color:#222; color:#fff;" onclick="resetAll()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // Глобальная база данных фильмов
        const moviesDatabase = [
            { id: 1, title: "Интерстеллар", genre: "Фантастика, Драма", rating: "8.6", price: 350, icon: "🚀" },
            { id: 2, title: "Начало", genre: "Фантастика, Боевик", rating: "8.7", price: 320, icon: "🌀" },
            { id: 3, title: "Дюна: Часть Вторая", genre: "Фантастика, Приключения", rating: "8.5", price: 400, icon: "⏳" },
            { id: 4, title: "Темный рыцарь", genre: "Боевик, Триллер", rating: "9.0", price: 300, icon: "🦇" }
        ];

        // Глобальное расписание сеансов
        const sessionsList = ["12:00", "15:30", "19:00", "22:15"];

        // База данных Кинобара
        const barInventory = [
            { id: "pop_s", name: "Попкорн Классический (S)", price: 250, category: "Снеки" },
            { id: "pop_m", name: "Попкорн Карамельный (M)", price: 350, category: "Снеки" },
            { id: "pop_l", name: "Попкорн Большой Микс (L)", price: 450, category: "Снеки" },
            { id: "cola_m", name: "Кола Холодная (0.5л)", price: 180, category: "Напитки" },
            { id: "juice", name: "Сок Мультифрукт (0.4л)", price: 150, category: "Напитки" },
            { id: "combo_super", name: "Супер Комбо (Попкорн L + Напиток 0.5л)", price: 550, category: "Комбо" }
        ];

        // Текущее состояние приложения
        let state = {
            selectedMovie: null,
            selectedSession: null,
            selectedSeats: [], // Массив объектов {row, col}
            barSelection: {},  // id: count
            occupiedSeatsCache: {} // Кэш занятых мест по ключу "movie_session"
        };

        // Инициализация каталога фильмов
        function renderMovies() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            moviesDatabase.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-poster">
                        <div class="movie-poster-fallback">${movie.icon}</div>
                        <div class="movie-rating">${movie.rating}</div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">${movie.genre} | ${movie.price} ₽</div>
                        <button class="btn" onclick="selectMovie(${movie.id})">Выбрать сеанс</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Выбор фильма
        function selectMovie(movieId) {
            const movie = moviesDatabase.find(m => m.id === movieId);
            state.selectedMovie = movie;
            state.selectedSession = null;
            state.selectedSeats = [];
            state.barSelection = {};

            document.getElementById('booking-section').style.display = 'block';
            document.getElementById('booking-headline').innerText = `Бронирование: ${movie.title}`;
            
            // Сбрасываем видимость вложенных шагов
            document.getElementById('hall-wrapper').style.display = 'none';
            document.getElementById('bar-section').style.display = 'none';
            document.getElementById('cart-wrapper').style.display = 'none';

            // Рендерим сеансы
            const sessionGrid = document.getElementById('session-grid');
            sessionGrid.innerHTML = '';
            sessionsList.forEach(time => {
                const chip = document.createElement('div');
                chip.className = 'session-chip';
                chip.innerText = time;
                chip.onclick = () => selectSession(time, chip);
                sessionGrid.appendChild(chip);
            });

            document.getElementById('booking-section').scrollIntoView({ behavior: 'smooth' });
            updateCart();
        }

        // Выбор сеанса
        function selectSession(time, chipElement) {
            state.selectedSession = time;
            state.selectedSeats = [];
            
            // Визуальный переключатель активного сеанса
            document.querySelectorAll('.session-chip').forEach(el => el.classList.remove('active'));
            chipElement.classList.add('active');

            // Генерация занятых мест для этого конкретного фильма и сеанса
            const cacheKey = `${state.selectedMovie.id}_${time}`;
            if (!state.occupiedSeatsCache[cacheKey]) {
                const occupied = [];
                for(let r = 1; r <= 6; r++) {
                    for(let c = 1; c <= 10; c++) {
                        // Случайная генерация ~25% занятых мест для реализма
                        if(Math.random() < 0.25) {
                            occupied.push(`${r}-${c}`);
                        }
                    }
                }
                state.occupiedSeatsCache[cacheKey] = occupied;
            }

            // Открываем карту зала и бар
            document.getElementById('hall-wrapper').style.display = 'block';
            document.getElementById('bar-section').style.display = 'block';
            document.getElementById('cart-wrapper').style.display = 'block';

            renderSeats(cacheKey);
            renderBar();
            updateCart();
        }

        // Рендеринг сетки зала
        function renderSeats(cacheKey) {
            const grid = document.getElementById('seating-grid');
            grid.innerHTML = '';
            const occupiedList = state.occupiedSeatsCache[cacheKey];

            for (let row = 1; row <= 6; row++) {
                for (let col = 1; col <= 10; col++) {
                    const seat = document.createElement('div');
                    const seatKey = `${row}-${col}`;
                    
                    if (occupiedList.includes(seatKey)) {
                        seat.className = 'seat occupied';
                    } else {
                        seat.className = 'seat';
                        seat.innerText = col;
                        
                        // Проверяем, выбрано ли уже кресло
                        if (state.selectedSeats.some(s => s.row === row && s.col === col)) {
                            seat.classList.add('selected');
                        }

                        seat.onclick = () => toggleSeat(row, col, seat);
                    }
                    grid.appendChild(seat);
                }
            }
        }

        // Клик по креслу
        function toggleSeat(row, col, element) {
            const index = state.selectedSeats.findIndex(s => s.row === row && s.col === col);
            if (index > -1) {
                state.selectedSeats.splice(index, 1);
                element.classList.remove('selected');
            } else {
                state.selectedSeats.push({ row, col });
                element.classList.add('selected');
            }
            updateCart();
        }

        // Рендеринг кинобара
        function renderBar() {
            const grid = document.getElementById('bar-grid');
            grid.innerHTML = '';

            barInventory.forEach(item => {
                const count = state.barSelection[item.id] || 0;
                const barItem = document.createElement('div');
                barItem.className = 'bar-item';
                barItem.innerHTML = `
                    <div class="bar-item-info">
                        <h4>${item.name}</h4>
                        <p>${item.price} ₽ / шт.</p>
                    </div>
                    <div class="bar-controls">
                        <button class="counter-btn" ${count === 0 ? 'disabled' : ''} onclick="updateBarItem('${item.id}', -1)">-</button>
                        <span class="counter-value">${count}</span>
                        <button class="counter-btn" onclick="updateBarItem('${item.id}', 1)">+</button>
                    </div>
                `;
                grid.appendChild(barItem);
            });
        }

        // Изменение количества товаров бара
        function updateBarItem(id, delta) {
            const current = state.barSelection[id] || 0;
            const next = current + delta;
            if (next <= 0) {
                delete state.barSelection[id];
            } else {
                state.barSelection[id] = next;
            }
            renderBar();
            updateCart();
        }

        // Обновление итогов корзины
        function updateCart() {
            const details = document.getElementById('cart-details');
            details.innerHTML = '';
            let total = 0;

            // Расчет билетов
            if (state.selectedSeats.length > 0) {
                const ticketPrice = state.selectedMovie.price;
                const cost = state.selectedSeats.length * ticketPrice;
                total += cost;

                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <span>Билеты (${state.selectedSeats.length} шт.):</span>
                    <span>${cost} ₽</span>
                `;
                details.appendChild(item);
            }

            // Расчет продуктов из бара
            Object.keys(state.barSelection).forEach(id => {
                const product = barInventory.find(p => p.id === id);
                const count = state.barSelection[id];
                const cost = product.price * count;
                total += cost;

                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <span>${product.name} x${count}:</span>
                    <span>${cost} ₽</span>
                `;
                details.appendChild(item);
            });

            if (state.selectedSeats.length === 0 && Object.keys(state.barSelection).length === 0) {
                details.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Ничего не выбрано</p>';
            }

            document.getElementById('total-cost').innerText = `${total} ₽`;
            return total;
        }

        // Обработка отправки формы оформления заказа
        function handleCheckout(event) {
            event.preventDefault();
            
            if (state.selectedSeats.length === 0) {
                alert("Пожалуйста, выберите хотя бы одно место в зале для завершения бронирования.");
                return;
            }

            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const phone = document.getElementById('user-phone').value;
            const finalTotal = updateCart();

            // Генерация структуры чека внутри модального окна
            const receiptBody = document.getElementById('ticket-receipt-body');
            receiptBody.innerHTML = `
                <div class="ticket-row"><span class="label">Пассажир/Зритель:</span><span class="val">${name}</span></div>
                <div class="ticket-row"><span class="label">Телефон:</span><span class="val">${phone}</span></div>
                <div class="ticket-row"><span class="label">Фильм:</span><span class="val">${state.selectedMovie.title}</span></div>
                <div class="ticket-row"><span class="label">Сеанс:</span><span class="val">${state.selectedSession}</span></div>
                <div class="ticket-row">
                    <span class="label">Места:</span>
                    <span class="val">${state.selectedSeats.map(s => `Ряд ${s.row}, Место ${s.col}`).join('<br>')}</span>
                </div>
            `;

            // Добавление позиций бара в чек, если они есть
            Object.keys(state.barSelection).forEach(id => {
                const product = barInventory.find(p => p.id === id);
                const count = state.barSelection[id];
                const itemRow = document.createElement('div');
                itemRow.className = 'ticket-row';
                itemRow.innerHTML = `<span class="label">${product.name} x${count}:</span><span class="val">${product.price * count} ₽</span>`;
                receiptBody.appendChild(itemRow);
            });

            // Итоговая сумма в чек
            const totalRow = document.createElement('div');
            totalRow.className = 'ticket-row';
            totalRow.style.marginTop = '15px';
            totalRow.style.fontSize = '1.2rem';
            totalRow.style.fontWeight = 'bold';
            totalRow.innerHTML = `<span>ИТОГО К ОПЛАТЕ:</span><span>${finalTotal} ₽</span>`;
            receiptBody.appendChild(totalRow);

            // Идентификатор билета
            document.getElementById('ticket-id').innerText = `ID БРОНИ: CV-${Math.floor(100000 + Math.random() * 900000)}`;

            // Открытие чека
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event) {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // Сброс состояния после закрытия/оплаты заказа
        function resetAll() {
            // Перед очисткой заносим места в глобальный кэш занятых
            const cacheKey = `${state.selectedMovie.id}_${state.selectedSession}`;
            state.selectedSeats.forEach(s => {
                state.occupiedSeatsCache[cacheKey].push(`${s.row}-${s.col}`);
            });

            state.selectedMovie = null;
            state.selectedSession = null;
            state.selectedSeats = [];
            state.barSelection = {};

            document.getElementById('checkout-form').reset();
            document.getElementById('booking-section').style.display = 'none';
            document.getElementById('modal-overlay').classList.remove('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderMovies();
        }

        // Старт скрипта при загрузке
        window.onload = renderMovies;
    </script>
</body>
</html>
