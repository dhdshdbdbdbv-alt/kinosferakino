<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИНОСФЕРА - Сеть кинотеатров</title>
    <link rel="stylesheet" href="css.css">
</head>

<body>

    <header class="main-header">
        <h1>КИНОСФЕРА</h1>
    </header>

    <main class="content-wrapper">
        <section class="movies-section">
            <h2>Сегодня в кино</h2>
            <div id="movies-grid" class="movies-grid">

                <div class="movie-card active" data-movie="bogatiry">
                    <img src="bogatiry.jpg" alt="Три богатыря">
                    <h3>Три богатыря</h3>
                    <p class="price">350 ₽</p>
                </div>

                <div class="movie-card" data-movie="karamazovy">
                    <img src="brothers-karamazovy.jpg" alt="Братья Карамазовы">
                    <h3>Братья Карамазовы</h3>
                    <p class="price">400 ₽</p>
                </div>

                <div class="movie-card" data-movie="dengi">
                    <img src="gryznyedengi.jpg" alt="Грязные деньги">
                    <h3>Грязные деньги</h3>
                    <p class="price">380 ₽</p>
                </div>

                <div class="movie-card" data-movie="bill">
                    <img src="killbill.jpg" alt="Убить Билла">
                    <h3>Убить Билла</h3>
                    <p class="price">450 ₽</p>
                </div>

                <div class="movie-card" data-movie="komers">
                    <img src="komers.jpg" alt="Комерс">
                    <h3>Комерс</h3>
                    <p class="price">350 ₽</p>
                </div>

                <div class="movie-card" data-movie="koshey">
                    <img src="koshey.jpg" alt="Кощей">
                    <h3>Кощей</h3>
                    <p class="price">380 ₽</p>
                </div>

                <div class="movie-card" data-movie="leo">
                    <img src="leoandtig.jpg" alt="Лео и Тиг">
                    <h3>Лео и Тиг</h3>
                    <p class="price">300 ₽</p>
                </div>

                <div class="movie-card" data-movie="michael">
                    <img src="Michael_(2026_film)_poster.jpg" alt="Майкл (2026)">
                    <h3>Майкл (2026)</h3>
                    <p class="price">500 ₽</p>
                </div>

                <div class="movie-card" data-movie="momo">
                    <img src="momo.jpg" alt="Момо">
                    <h3>Момо</h3>
                    <p class="price">420 ₽</p>
                </div>

                <div class="movie-card" data-movie="propast">
                    <img src="propast.jpg" alt="Пропасть">
                    <h3>Пропасть</h3>
                    <p class="price">390 ₽</p>
                </div>

            </div>
        </section>

        <section class="booking-section">
            <h2>Выберите места</h2>
            <div class="hall-container">
                <div class="screen">ЭКРАН</div>
                <div id="cinema-hall" class="cinema-hall"></div>
            </div>

            <div class="booking-summary">
                <p>Выбрано мест: <span id="selected-count">0</span></p>
                <p>Итого к оплате: <span id="total-price">0</span> ₽</p>
                <button id="book-btn" class="book-button" disabled>Забронировать</button>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>

</html>
