<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИНОСФЕРА - Сеть кинотеатров</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <header class="main-header">
        <h1>КИНОСФЕРА</h1>
    </header>

    <main class="content-wrapper">
        <section class="movies-section">
            <h2>Сегодня в кино</h2>
            <div id="movies-grid" class="movies-grid">
                
                <div class="movie-card" data-movie="bogatiry">
                    <img src="bogatyry.jpg" alt="Богатыри">
                    <h3>Богатыри</h3>
                    <p class="price">350 ₽</p>
                </div>

                <div class="movie-card" data-movie="karamazovy">
                    <img src="brothers-karamazovy.jpg" alt="Братья Карамазовы">
                    <h3>Братья Карамазовы</h3>
                    <p class="price">400 ₽</p>
                </div>

                <div class="movie-card" data-movie="dengi">
                    <img src="gryznyedengi.jpg" alt="Грязные деньги">
                    <h3>Грязные деньги</h3>
                    <p class="price">380 ₽</p>
                </div>

                <div class="movie-card" data-movie="bill">
                    <img src="killbill.jpg" alt="Убить Билла">
                    <h3>Убить Билла</h3>
                    <p class="price">450 ₽</p>
                </div>

                <div class="movie-card" data-movie="komers">
                    <img src="komers.jpg" alt="Комерс">
                    <h3>Комерс</h3>
                    <p class="price">350 ₽</p>
                </div>

                <div class="movie-card" data-movie="koshey">
                    <img src="koshey.jpg" alt="Кощей">
                    <h3>Кощей</h3>
                    <p class="price">380 ₽</p>
                </div>

                <div class="movie-card" data-movie="leo">
                    <img src="leoandtig.jpg" alt="Лео и Тиг">
                    <h3>Лео и Тиг</h3>
                    <p class="price">300 ₽</p>
                </div>

                <div class="movie-card" data-movie="michael">
                    <img src="Michael_(2026_film)_poster.jpg" alt="Майкл (2026)">
                    <h3>Майкл (2026)</h3>
                    <p class="price">500 ₽</p>
                </div>

                <div class="movie-card" data-movie="momo">
                    <img src="momo.jpg" alt="Момо">
                    <h3>Момо</h3>
                    <p class="price">420 ₽</p>
                </div>

                <div class="movie-card" data-movie="propast">
                    <img src="propast.jpg" alt="Пропасть">
                    <h3>Пропасть</h3>
                    <p class="price">390 ₽</p>
                </div>

            </div>
        </section>

        <section id="booking-window" class="booking-section hidden">
            <h2 id="booking-title">Выбор мест и услуг</h2>
            
            <div class="hall-container">
                <div class="screen">ЭКРАН</div>
                <div id="cinema-hall" class="cinema-hall"></div>
            </div>

            <div class="bar-container">
                <h3>Огромный Кинобар</h3>
                
                <div class="bar-category">
                    <h4>🔥 Классические Комбо</h4>
                    <div class="bar-grid">
                        <label class="bar-item"><input type="checkbox" class="bar-checkbox" data-price="450"> <span>Стандарт Комбо (Попкорн М + Напиток 0.5) — 450 ₽</span></label>
                        <label class="bar-item"><input type="checkbox" class="bar-checkbox" data-price="590"> <span>Большой Комбо (Попкорн L + Напиток 0.8) — 590 ₽</span></label>
                        <label class="bar-item"><input type="checkbox" class="bar-checkbox" data-price="380"> <span>Детский Комбо (Попкорн S + Сок + Игрушка) — 380 ₽</span></label>
                    </div>
                </div>

                <div class="bar-category">
                    <h4>👥
